<div class="d-flex flex-column flex-md-row align-items-center p-3 px-md-4 mb-3 bg-white border-bottom box-shadow">
    <h5 class="my-0 mr-md-auto font-weight-normal">
        <a href="{% url 'catalog:home' %}" class="text-decoration-none text-dark">Skystore</a>
    </h5>
    <nav class="ms-5">
        <a class="p-2 btn btn-outline-primary" href="{% url 'catalog:home' %}">Каталог</a>
        <a class="p-2 btn btn-outline-primary" href="{% url 'blog:post_list' %}">Блог</a>

        {% if user.is_authenticated %}
        <a class="p-2 btn btn-outline-success" href="{% url 'catalog:product_create' %}">Добавить товар</a>
        <a class="p-2 btn btn-outline-info" href="{% url 'users:profile' %}">Профиль</a>
        <a class="p-2 btn btn-outline-danger" href="{% url 'users:logout' %}">Выйти</a>
        {% if user.is_staff %}
        <a class="p-2 btn btn-outline-success" href="{% url 'admin:index' %}">Админка</a>
        {% endif %}
        {% else %}
        <a class="p-2 btn btn-outline-primary" href="{% url 'users:login' %}">Войти</a>
        <a class="p-2 btn btn-outline-success" href="{% url 'users:register' %}">Регистрация</a>
        {% endif %}

        <a class="p-2 btn btn-outline-primary" href="{% url 'catalog:contacts' %}">Контакты</a>
    </nav>
</div>
